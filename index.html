<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>브레스인 · 수업 플레이어</title>
<style>
  :root{
    --bg-deep:#17131f;--bg-panel:#221b2e;--bg-panel-2:#2c2340;--line:#3a3050;
    --coral:#FF7A59;--coral-soft:#ff9a7e;--lav:#B794F6;
    --text:#F5F0EB;--muted:#9A8FA8;--ok:#5AD1A8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{overflow-x:hidden;background:
      radial-gradient(1200px 600px at 50% -10%, rgba(255,122,89,.10), transparent 60%),
      radial-gradient(900px 500px at 100% 110%, rgba(183,148,246,.10), transparent 60%),
      var(--bg-deep);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    display:flex;justify-content:center;padding:18px;}
  .app{width:100%;max-width:520px;display:flex;flex-direction:column;gap:16px;}

  .tabbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
    background:var(--bg-panel);border:1px solid var(--line);border-radius:18px;padding:6px;}
  .tabbar button{background:none;border:none;color:var(--muted);font-size:13px;font-weight:800;
    padding:11px 4px;border-radius:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .tabbar button .ic{width:20px;height:20px;}
  .tabbar button.active{background:var(--bg-panel-2);color:var(--text);}
  .tabbar button.active .ic{color:var(--coral);}

  .tab{display:none;} .tab.active{display:flex;flex-direction:column;gap:16px;}

  .urlbar{display:flex;gap:8px;}
  .urlbar input{flex:1;min-width:0;background:var(--bg-panel);border:1px solid var(--line);color:var(--text);
    border-radius:14px;padding:14px 16px;font-size:15px;outline:none;}
  .urlbar input::placeholder{color:var(--muted);}
  .urlbar input:focus{border-color:var(--coral);}
  .urlbar button{background:var(--coral);color:#241018;border:none;border-radius:14px;
    padding:0 18px;font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap;}
  .urlbar button:active{transform:scale(.97);}

  .stage{position:relative;border-radius:22px;overflow:hidden;background:var(--bg-panel);
    border:1px solid var(--line);width:100%;max-width:484px;aspect-ratio:16 / 9;flex-shrink:0;align-self:center;display:flex;align-items:center;justify-content:center;}
  .stage.empty .ph{display:block;}
  .stage .ph{display:none;color:var(--muted);font-size:14px;text-align:center;padding:24px;line-height:1.6;}
  #player{position:absolute;inset:0;width:100%;height:100%;}
  .stage.empty #player{display:none;}
  .stage.tucked{position:fixed;top:0;left:0;width:1px;height:1px;min-height:0;
    aspect-ratio:auto;opacity:0;pointer-events:none;overflow:hidden;border:none;border-radius:0;}

  .cover{position:absolute;inset:0;z-index:2;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:var(--bg-panel);overflow:hidden;}
  .stage:not(.empty):not(.video-visible) .cover{display:flex;}
  .cover .bg{position:absolute;inset:-30px;background-size:cover;background-position:center;
    filter:blur(30px) brightness(.4) saturate(1.3);transform:scale(1.15);}
  .cover .bg::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 38%,transparent,rgba(23,19,31,.8));}
  .cover .eq{position:relative;display:flex;align-items:flex-end;gap:6px;height:56px;}
  .cover .eq i{width:7px;border-radius:4px;height:14px;background:linear-gradient(var(--coral-soft),var(--lav));}
  .cover.playing .eq i{animation:eqbounce .9s ease-in-out infinite;}
  .cover .eq i:nth-child(1){animation-delay:0s;} .cover .eq i:nth-child(2){animation-delay:.22s;}
  .cover .eq i:nth-child(3){animation-delay:.08s;} .cover .eq i:nth-child(4){animation-delay:.4s;} .cover .eq i:nth-child(5){animation-delay:.16s;}
  @keyframes eqbounce{0%,100%{height:12px;}50%{height:50px;}}
  .cover .ctitle{position:relative;color:var(--text);font-size:15px;font-weight:700;max-width:80%;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cover .csub{position:relative;color:var(--muted);font-size:12px;font-weight:600;}
  .stage-btns{display:flex;flex-direction:row;flex-wrap:nowrap;gap:8px;align-items:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:none;}
  .stage-btns::-webkit-scrollbar{display:none;}
  .eye{flex-shrink:0;text-align:center;white-space:nowrap;background:rgba(23,19,31,.65);border:1px solid var(--line);color:var(--text);
    font-size:12px;font-weight:700;cursor:pointer;border-radius:20px;padding:9px 12px;
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
  .eye:active{transform:scale(.96);} .eye.on{border-color:var(--coral);color:var(--coral-soft);}
  .stage-btns.is-empty{display:none;}
  .stage-btns:not(.is-video) #mirror,.stage-btns:not(.is-video) #zoom,.stage-btns:not(.is-video) #zoomout,.stage-btns:not(.is-video) #ratio,.stage-btns:not(.is-video) #mute{display:none;}
  .panlayer{position:absolute;inset:0;z-index:2;display:none;cursor:grab;touch-action:none;}
  .stage.video-visible.zoomed .panlayer{display:block;}
  .panlayer.grabbing{cursor:grabbing;}
  @media (prefers-reduced-motion:reduce){.cover.playing .eq i{animation:none;height:30px;}}

  .nowrow{display:flex;align-items:center;gap:10px;min-height:18px;}
  .nowtitle{flex:1;font-size:13px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .speedTag{font-size:12px;color:var(--coral-soft);font-weight:800;font-variant-numeric:tabular-nums;}

  .timeline-wrap{padding:2px 2px 0;}
  .timeline{position:relative;height:26px;display:flex;align-items:center;cursor:pointer;touch-action:none;}
  .track{position:absolute;left:0;right:0;height:8px;border-radius:6px;background:var(--bg-panel-2);}
  .band{position:absolute;height:8px;border-radius:6px;background:linear-gradient(90deg,var(--coral),var(--lav));box-shadow:0 0 16px rgba(255,122,89,.5);opacity:0;transition:opacity .2s;}
  .band.on{opacity:1;}
  .played{position:absolute;height:8px;border-radius:6px;background:rgba(245,240,235,.35);}
  .head{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--text);box-shadow:0 0 12px rgba(245,240,235,.6);transform:translateX(-9px);}
  .marker{position:absolute;top:-3px;width:3px;height:32px;border-radius:2px;touch-action:none;cursor:grab;z-index:4;}
  .marker::before{content:"";position:absolute;left:-12px;right:-12px;top:-8px;bottom:-8px;}
  .marker.grabbing{cursor:grabbing;}
  .marker.a{background:var(--coral);} .marker.b{background:var(--lav);}
  .marker span{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;pointer-events:none;}
  .marker.grabbing span{font-size:12px;}
  .marker.a span{color:var(--coral);} .marker.b span{color:var(--lav);}
  .times{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:4px;font-weight:600;}

  .transport{display:flex;align-items:center;justify-content:center;gap:22px;}
  .nudge{background:var(--bg-panel);border:1px solid var(--line);color:var(--text);width:58px;height:58px;border-radius:18px;font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .nudge:active{background:var(--bg-panel-2);} .nudge b{font-size:18px;}
  .play{width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 35% 30%,var(--coral-soft),var(--coral));box-shadow:0 0 34px rgba(255,122,89,.55);display:flex;align-items:center;justify-content:center;}
  .play:active{transform:scale(.96);} .play svg{width:40px;height:40px;fill:#241018;}

  .ab{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .ab button{background:var(--bg-panel);border:1px solid var(--line);color:var(--text);border-radius:16px;padding:16px 8px;font-size:15px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .ab button small{font-size:11px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;}
  .ab button:active{background:var(--bg-panel-2);}
  .ab .setA.set{border-color:var(--coral);} .ab .setA.set small{color:var(--coral-soft);}
  .ab .setB.set{border-color:var(--lav);} .ab .setB.set small{color:var(--lav);}
  .ab .loop.on{background:linear-gradient(135deg,var(--coral),var(--lav));border-color:transparent;color:#241018;}
  .ab .loop.on small{color:#3a1a10;}

  .section-label{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.06em;margin:2px 2px -4px;text-transform:uppercase;}
  .speed{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .speed button{background:var(--bg-panel);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:14px 4px;font-size:17px;font-weight:800;cursor:pointer;font-variant-numeric:tabular-nums;}
  .speed button.on{background:var(--coral);border-color:transparent;color:#241018;}
  .speed button:active{transform:scale(.96);}

  .seg-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .seg-btns button{background:var(--bg-panel);border:1px solid var(--line);color:var(--text);border-radius:16px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;}
  .seg-btns button:active{background:var(--bg-panel-2);}
  .seg-btns button.on{border-color:var(--coral);color:var(--coral-soft);}
  .panellist{display:flex;flex-direction:column;gap:8px;}
  .song.playing-now{border-color:var(--coral);box-shadow:0 0 0 1px var(--coral) inset;}
  .song.playing-now .smeta b{color:var(--coral-soft);}
  .seg{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
  .seg .sopen{flex:1;min-width:0;cursor:pointer;}
  .seg .sopen .ln{display:flex;align-items:baseline;gap:8px;min-width:0;}
  .seg .sopen b{font-size:16px;font-weight:800;flex-shrink:0;}
  .seg .sopen .rng{font-size:13px;color:var(--coral-soft);font-variant-numeric:tabular-nums;font-weight:700;flex-shrink:0;}
  .seg .sopen .memo{font-size:12px;color:var(--muted);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .seg .sact{background:none;border:none;color:var(--muted);padding:6px 4px;cursor:pointer;flex-shrink:0;}
  .seg .sact svg{width:17px;height:17px;display:block;} .seg .sact.del{font-size:19px;line-height:1;}
  .seg .sact:active{color:var(--coral);}

  .listhead{display:flex;align-items:center;justify-content:space-between;margin:2px;}
  .listhead .section-label{margin:0;}
  .listhead button{background:none;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;}
  .listhead button:active{color:var(--text);border-color:var(--coral);}

  .dndlist{display:flex;flex-direction:column;gap:8px;position:relative;}
  .empty-note{color:var(--muted);font-size:13px;text-align:center;padding:18px;line-height:1.6;}

  .folder{display:flex;align-items:center;gap:8px;background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:12px 10px;}
  .folder.dragging{opacity:.95;box-shadow:0 14px 34px rgba(0,0,0,.55);z-index:10;position:relative;border-color:var(--coral);}
  .folder.drop-target{border-color:var(--coral);box-shadow:0 0 0 2px var(--coral) inset;background:var(--bg-panel-2);}
  .folder .drag{cursor:grab;color:var(--muted);font-size:17px;padding:8px 2px;touch-action:none;flex-shrink:0;user-select:none;}
  .folder .fopen{display:flex;align-items:center;gap:11px;flex:1;min-width:0;cursor:pointer;}
  .folder .ficon{width:40px;height:40px;border-radius:12px;background:var(--bg-panel-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .folder .ficon svg{width:22px;height:22px;color:var(--coral);}
  .folder .fmeta{flex:1;min-width:0;}
  .folder .fmeta b{font-size:15px;font-weight:800;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .folder .fmeta small{font-size:12px;color:var(--muted);}
  .folder .fact{background:none;border:none;color:var(--muted);padding:6px 4px;cursor:pointer;flex-shrink:0;}
  .folder .fact svg{width:16px;height:16px;display:block;} .folder .fact.del{font-size:18px;line-height:1;}
  .folder .fact:active{color:var(--coral);}
  .folder .chev{color:var(--muted);font-size:20px;flex-shrink:0;margin-left:-2px;}

  .folderbar{display:flex;align-items:center;gap:10px;}
  .folderbar .back{background:var(--bg-panel);border:1px solid var(--line);color:var(--text);width:44px;height:44px;border-radius:13px;font-size:24px;line-height:1;cursor:pointer;flex-shrink:0;}
  .folderbar .back:active{background:var(--bg-panel-2);}
  .folderbar .fname{flex:1;font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .folderbar .rename{background:none;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;}
  .folderbar .rename:active{color:var(--text);border-color:var(--coral);}

  .song{display:flex;align-items:center;gap:6px;background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:9px 8px;}
  .song.dragging{opacity:.95;box-shadow:0 14px 34px rgba(0,0,0,.55);z-index:10;position:relative;border-color:var(--coral);}
  .song .drag{cursor:grab;color:var(--muted);font-size:17px;padding:8px 2px;touch-action:none;flex-shrink:0;user-select:none;}
  .song img{width:46px;height:33px;border-radius:8px;object-fit:cover;background:var(--bg-panel-2);flex-shrink:0;}
  .song .smeta{flex:1;min-width:0;cursor:pointer;}
  .song .smeta b{font-size:14px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .song .smeta small{font-size:11px;color:var(--muted);}
  .song .sact{background:none;border:none;color:var(--muted);padding:6px 3px;cursor:pointer;flex-shrink:0;}
  .song .sact svg{width:17px;height:17px;display:block;} .song .sact.del{font-size:19px;line-height:1;}
  .song .sact:active{color:var(--coral);}

  .setting{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:16px;font-size:15px;font-weight:600;}
  .setting .sw{margin-left:auto;width:50px;height:28px;border-radius:20px;background:var(--bg-panel-2);border:1px solid var(--line);position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
  .setting .sw::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:var(--muted);transition:.2s;}
  .setting.on .sw{background:var(--ok);border-color:transparent;} .setting.on .sw::after{left:24px;background:#0c2a20;}
  .setting .hint{color:var(--muted);font-size:11px;font-weight:500;display:block;margin-top:2px;}
  .footnote{color:var(--muted);font-size:11px;text-align:center;line-height:1.6;padding:8px;}

  .modal{position:fixed;inset:0;z-index:50;background:rgba(10,8,14,.72);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:22px;}
  .modal.on{display:flex;}
  .sheet{width:100%;max-width:420px;background:var(--bg-panel);border:1px solid var(--line);border-radius:22px;padding:24px;display:flex;flex-direction:column;gap:10px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .sheet h3{font-size:18px;font-weight:800;margin-bottom:4px;}
  .sheet label{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px;}
  .sheet input,.sheet select{background:var(--bg-deep);border:1px solid var(--line);color:var(--text);border-radius:13px;padding:14px 15px;font-size:16px;outline:none;}
  .sheet input:focus,.sheet select:focus{border-color:var(--coral);}
  .sheet select{-webkit-appearance:none;appearance:none;cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239A8FA8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 15px center;padding-right:40px;}
  .mbtns{display:flex;gap:10px;margin-top:14px;}
  .mbtns button{flex:1;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;border:none;}
  .mbtns .cancel{background:var(--bg-panel-2);color:var(--text);border:1px solid var(--line);}
  .mbtns .save{background:var(--coral);color:#241018;}
  .mbtns button:active{transform:scale(.97);}
  .folderpick{display:flex;flex-direction:column;gap:8px;max-height:52vh;overflow:auto;margin-top:6px;}
  .folderpick button{display:flex;align-items:center;gap:10px;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:15px 14px;font-size:15px;font-weight:700;cursor:pointer;text-align:left;}
  .folderpick button:active{border-color:var(--coral);}
  .folderpick button .fp-icon{width:20px;height:20px;color:var(--coral);flex-shrink:0;}
  .folderpick button span.nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .folderpick button small{color:var(--muted);font-weight:600;flex-shrink:0;}
</style>
</head>
<body>
<div class="app">

  <div class="tabbar">
    <button data-tab="player" class="active">
      <svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>플레이어
    </button>
    <button data-tab="playlist">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h11M4 12h11M4 17h7"/><circle cx="19" cy="15.5" r="2.2"/></svg>플레이리스트
    </button>
    <button data-tab="settings">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 3.5v3M12 17.5v3M3.5 12h3M17.5 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2"/></svg>설정
    </button>
  </div>

  <div class="stage-btns">
    <button class="eye" id="eye">영상 보기</button>
    <button class="eye" id="mirror">거울모드</button>
    <button class="eye" id="zoom">확대</button>
    <button class="eye" id="zoomout">축소</button>
    <button class="eye" id="ratio">16:9</button>
    <button class="eye" id="mute">음소거</button>
  </div>

  <div class="stage empty" id="stage">
    <div class="ph">플레이리스트 탭에서<br>곡을 선택하세요</div>
    <div id="player"></div>
    <div class="panlayer" id="panlayer"></div>
    <div class="cover" id="cover">
      <div class="bg" id="coverBg"></div>
      <div class="eq"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="ctitle" id="coverTitle">소리만 재생 중</div>
      <div class="csub">화면은 꺼져 있고 소리만 나갑니다</div>
    </div>
  </div>

  <div class="tab active" id="tab-player">
    <div class="nowrow"><span class="nowtitle" id="nowtitle"></span><span class="speedTag" id="speedTag">1.0×</span></div>
    <div class="timeline-wrap">
      <div class="timeline" id="timeline">
        <div class="track"></div><div class="band" id="band"></div><div class="played" id="played"></div>
        <div class="marker a" id="markA" style="display:none"><span>A</span></div>
        <div class="marker b" id="markB" style="display:none"><span>B</span></div>
        <div class="head" id="head" style="left:0"></div>
      </div>
      <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    </div>
    <div class="transport">
      <button class="nudge" id="back5"><b>«</b>5초</button>
      <button class="play" id="play" aria-label="재생"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="nudge" id="fwd5">5초<b>»</b></button>
    </div>
    <div class="ab">
      <button class="setA" id="setA">A 지점<small id="aTime">—</small></button>
      <button class="loop" id="loop">구간반복<small id="loopState">꺼짐</small></button>
      <button class="setB" id="setB">B 지점<small id="bTime">—</small></button>
    </div>
    <div class="section-label">재생 속도</div>
    <div class="speed">
      <button data-s="0.25">0.25×</button><button data-s="0.5">0.5×</button>
      <button data-s="0.75">0.75×</button><button data-s="1" class="on">1.0×</button>
    </div>
    <div class="seg-btns">
      <button id="saveSeg">구간 저장</button>
      <button id="showList">재생목록</button>
    </div>
    <div class="panellist" id="panelList" style="display:none"></div>
  </div>

  <div class="tab" id="tab-playlist">
    <div id="rootView">
      <div class="urlbar" style="margin-bottom:14px">
        <input id="url" type="text" inputmode="url" placeholder="유튜브 주소 붙여넣기">
        <button id="saveSong">곡 저장</button>
        <button id="addFolder">새 폴더</button>
      </div>
      <div class="dndlist" id="rootlist"></div>
    </div>
    <div id="folderView" style="display:none">
      <div class="folderbar">
        <button class="back" id="backFolder">‹</button>
        <span class="fname" id="folderName">폴더</span>
        <button class="rename" id="renameFolder">이름변경</button>
      </div>
      <div class="dndlist" id="songlist" style="margin-top:14px"></div>
    </div>
  </div>

  <div class="tab" id="tab-settings">
    <div class="section-label">재생</div>
    <div class="setting" id="wake"><div>화면 켜둠<span class="hint">수업 중 화면 꺼짐 방지</span></div><div class="sw" id="wakeSw"></div></div>
    <div class="footnote">미리보기 버전입니다 · 저장한 목록은 새로고침하면 사라집니다</div>
  </div>
</div>

<div class="modal" id="songModal">
  <div class="sheet">
    <h3 id="songModalTitle">곡 저장</h3>
    <label>가수명</label><input id="mArtist" type="text" placeholder="예: 아이브">
    <label>곡명</label><input id="mSong" type="text" placeholder="예: I AM">
    <div id="locWrap"><label>저장 위치</label><select id="mLoc"></select></div>
    <div class="mbtns"><button class="cancel" id="songCancel">취소</button><button class="save" id="songSave">저장</button></div>
  </div>
</div>

<div class="modal" id="folderModal">
  <div class="sheet">
    <h3 id="folderModalTitle">새 폴더</h3>
    <label>폴더 이름</label><input id="mFolder" type="text" placeholder="예: 초급반">
    <div class="mbtns"><button class="cancel" id="folderCancel">취소</button><button class="save" id="folderSave">저장</button></div>
  </div>
</div>

<div class="modal" id="moveModal">
  <div class="sheet">
    <h3>다른 위치로 이동</h3>
    <div class="folderpick" id="folderPick"></div>
    <div class="mbtns"><button class="cancel" id="moveCancel">취소</button></div>
  </div>
</div>

<div class="modal" id="segModal">
  <div class="sheet">
    <h3>구간 메모</h3>
    <label>메모 (선택)</label><input id="mMemo" type="text" placeholder="예: 후렴 안무 / 8카운트 2번">
    <div class="mbtns"><button class="cancel" id="segCancel">취소</button><button class="save" id="segSave">저장</button></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
(function(){
  var player=null,ready=false,duration=0;
  var A=null,B=null,looping=false,speed=1,curId=null,curLabel='',mirrorOn=false,zoom=1,panX=0,panY=0;

  function uid(){return 'f'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
  var STORE='breathin_player_v1',canStore=false;
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');canStore=true;}catch(e){}
  function save(){if(!canStore)return;try{localStorage.setItem(STORE,JSON.stringify({root:root,segments:segments}));}catch(e){}}
  function load(){if(!canStore)return;try{var s=localStorage.getItem(STORE);if(s){var d=JSON.parse(s);if(Array.isArray(d.root))root=d.root;if(d.segments&&typeof d.segments==='object')segments=d.segments;}}catch(e){}}
  function updateFootnote(){var el=document.querySelector('.footnote');if(el)el.textContent=canStore?'폴더·곡·구간은 이 기기에 자동 저장됩니다':'미리보기 버전입니다 · 변경사항은 새로고침하면 사라집니다';}
  // root: 폴더 또는 곡 혼합. 폴더={kind:'folder',id,name,children:[]}, 곡={kind:'song',vid,artist,song}
  var root=[];
  var currentFolder=null; // null=최상위, 아니면 folderId
  var songCtx=null,folderCtx=null,moveCtx=null;

  var $=function(id){return document.getElementById(id);};
  function fmt(s){s=Math.max(0,Math.floor(s||0));var m=Math.floor(s/60);var r=s%60;return m+":"+(r<10?"0":"")+r;}
  function escapeHtml(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function extractId(u){
    if(!u)return null;u=u.trim();
    var m=u.match(/(?:v=|\/embed\/|youtu\.be\/|\/shorts\/|\/live\/)([A-Za-z0-9_-]{11})/);
    if(m)return m[1];
    if(/^[A-Za-z0-9_-]{11}$/.test(u))return u;return null;
  }
  function parseTitle(raw){
    if(!raw)return{artist:'',song:''};
    var t=raw;
    t=t.replace(/^\s*\[[^\]]*\]\s*/g,'');
    t=t.replace(/\((?:official|audio|video|mv|m\/v|lyric[s]?|color\s*coded|performance|live|4k|hd|teaser)[^)]*\)/ig,'');
    t=t.replace(/\b(official\s*(music\s*)?video|official\s*mv|m\/v|mv|lyric[s]?\s*video|audio)\b/ig,'');
    t=t.replace(/\s*[-\u2013|]\s*$/,'').trim();
    var artist='',song='';
    var q=t.match(/['"\u2018\u2019\u201c\u201d\u300c\u300e]([^'"\u2018\u2019\u201c\u201d\u300d\u300f]+)['"\u2018\u2019\u201c\u201d\u300d\u300f]/);
    if(q){song=q[1].trim();artist=t.slice(0,q.index).replace(/\s*[-\u2013|:]\s*$/,'').trim();}
    else if(/\s[-\u2013]\s/.test(t)){var p=t.split(/\s[-\u2013]\s/);artist=p[0].trim();song=p.slice(1).join(' - ').trim();}
    else{song=t.trim();}
    return{artist:artist,song:song};
  }
  function fetchMeta(vid,cb){
    fetch('https://www.youtube.com/oembed?format=json&url=https://www.youtube.com/watch?v='+vid)
      .then(function(r){return r.ok?r.json():null;}).then(function(d){cb(d&&d.title?d.title:'');}).catch(function(){cb('');});
  }
  function folderById(id){for(var i=0;i<root.length;i++){if(root[i].kind==='folder'&&root[i].id===id)return root[i];}return null;}

  var folderSvg='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>';
  var penSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
  var moveSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h11M10 9l3 3-3 3"/><path d="M13 7h3l1.5 1.6H22V18h-9V7z"/></svg>';

  // ---- tabs ----
  function switchTab(name){
    var isPlayer=(name==='player');
    $('stage').classList.toggle('tucked',!isPlayer);
    $('tab-player').classList.toggle('active',isPlayer);
    $('tab-playlist').classList.toggle('active',name==='playlist');
    $('tab-settings').classList.toggle('active',name==='settings');
    document.querySelectorAll('.tabbar button').forEach(function(b){b.classList.toggle('active',b.dataset.tab===name);});
  }
  document.querySelectorAll('.tabbar button').forEach(function(b){b.addEventListener('click',function(){switchTab(b.dataset.tab);});});

  // ---- youtube ----
  window.onYouTubeIframeAPIReady=function(){
    player=new YT.Player('player',{width:'100%',height:'100%',videoId:'',
      playerVars:{playsinline:1,rel:0,modestbranding:1,controls:0},
      events:{onReady:function(){ready=true;},
        onStateChange:function(e){
          if(e.data===YT.PlayerState.PLAYING){setPlayIcon(true);duration=player.getDuration()||0;$('dur').textContent=fmt(duration);refreshTitle();}
          if(e.data===YT.PlayerState.PAUSED){setPlayIcon(false);}
          if(e.data===YT.PlayerState.ENDED){setPlayIcon(false);if(!looping)nextSong();}
        }}});
  };
  function setPlayIcon(p){$('playIcon').innerHTML=p?'<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>';$('cover').classList.toggle('playing',p);}
  function refreshTitle(){if(curLabel){$('nowtitle').textContent=curLabel;$('coverTitle').textContent=curLabel;return;}try{var d=player.getVideoData();if(d&&d.title){$('nowtitle').textContent=d.title;$('coverTitle').textContent=d.title;}}catch(e){}}
  function playVid(vid,label){
    if(!vid)return;
    curId=vid;curLabel=label||'';A=null;B=null;looping=false;updateAB();updateLoopBtn();
    $('stage').classList.remove('empty');
    $('coverBg').style.backgroundImage='url(https://i.ytimg.com/vi/'+vid+'/hqdefault.jpg)';
    $('coverTitle').textContent=label||'불러오는 중…';$('nowtitle').textContent=label||'';
    if(ready&&player)player.loadVideoById(vid);
    setTimeout(refreshTitle,800);switchTab('player');renderPanel();
  }
  function flash(msg){var n=$('nowtitle');n.textContent=msg;n.style.color='var(--coral-soft)';setTimeout(function(){n.style.color='';refreshTitle();},1600);}

  function showVideo(){var st=$('stage');if(!st.classList.contains('video-visible')){st.classList.add('video-visible');$('eye').textContent='화면 끄기';}}
  function applyTransform(){var fr=$('player');if(!fr)return;var sx=(mirrorOn?-1:1)*zoom;fr.style.transformOrigin='center center';fr.style.transform='translate('+panX+'px,'+panY+'px) scale('+sx+','+zoom+')';}
  var zoomSteps=[1,1.5,2,3,4,6];
  function applyZoomUI(){$('zoom').textContent=zoom>1?('확대 '+zoom+'×'):'확대';$('zoom').classList.toggle('on',zoom>1);$('stage').classList.toggle('zoomed',zoom>1);}
  $('eye').addEventListener('click',function(){var st=$('stage');st.classList.toggle('video-visible');$('eye').textContent=st.classList.contains('video-visible')?'화면 끄기':'영상 보기';});
  $('mirror').addEventListener('click',function(){mirrorOn=!mirrorOn;$('mirror').classList.toggle('on',mirrorOn);if(mirrorOn)showVideo();applyTransform();});
  $('zoom').addEventListener('click',function(){var i=zoomSteps.indexOf(zoom);zoom=zoomSteps[(i+1)%zoomSteps.length];if(zoom===1){panX=0;panY=0;}applyZoomUI();if(zoom>1)showVideo();applyTransform();});
  $('zoomout').addEventListener('click',function(){var i=zoomSteps.indexOf(zoom);if(i>0){zoom=zoomSteps[i-1];}if(zoom===1){panX=0;panY=0;}applyZoomUI();if(zoom>1)showVideo();applyTransform();});
  var ratios=['16 / 9','9 / 16'],ratioLabels=['16:9','9:16'],ratioIdx=0;
  $('ratio').addEventListener('click',function(){ratioIdx=(ratioIdx+1)%ratios.length;$('stage').style.aspectRatio=ratios[ratioIdx];$('ratio').textContent=ratioLabels[ratioIdx];});
  $('mute').addEventListener('click',function(){if(!ready)return;if(player.isMuted()){player.unMute();$('mute').textContent='음소거';$('mute').classList.remove('on');}else{player.mute();$('mute').textContent='음소거 해제';$('mute').classList.add('on');}});
  // 확대 상태에서 영상 끌어 이동
  (function(){
    var pl=$('panlayer');
    pl.addEventListener('pointerdown',function(e){
      if(zoom<=1)return;e.preventDefault();
      var x0=e.clientX,y0=e.clientY,px0=panX,py0=panY;
      var rect=$('stage').getBoundingClientRect();
      var maxX=(zoom-1)*rect.width/2,maxY=(zoom-1)*rect.height/2;
      pl.classList.add('grabbing');
      function move(ev){
        panX=Math.max(-maxX,Math.min(maxX,px0+(ev.clientX-x0)));
        panY=Math.max(-maxY,Math.min(maxY,py0+(ev.clientY-y0)));
        applyTransform();
      }
      function up(){document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);pl.classList.remove('grabbing');}
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
    });
  })();

  $('play').addEventListener('click',function(){if(!ready||!curId)return;var st=player.getPlayerState();if(st===YT.PlayerState.PLAYING)player.pauseVideo();else player.playVideo();});
  $('back5').addEventListener('click',function(){if(ready)player.seekTo(Math.max(0,player.getCurrentTime()-5),true);});
  $('fwd5').addEventListener('click',function(){if(ready)player.seekTo(player.getCurrentTime()+5,true);});

  $('setA').addEventListener('click',function(){if(!ready||!curId)return;if(A!==null){A=null;}else{A=player.getCurrentTime();if(B!==null&&A>=B)B=null;}updateAB();});
  $('setB').addEventListener('click',function(){if(!ready||!curId)return;if(B!==null){B=null;}else{B=player.getCurrentTime();if(A!==null&&B<=A)A=null;}updateAB();});
  $('loop').addEventListener('click',function(){if(A===null||B===null){flash('A와 B 지점을 먼저 찍어주세요');return;}looping=!looping;updateLoopBtn();if(looping&&ready){if(player.getCurrentTime()<A||player.getCurrentTime()>B)player.seekTo(A,true);}});
  function updateAB(){$('aTime').textContent=A!==null?fmt(A):'—';$('bTime').textContent=B!==null?fmt(B):'—';$('setA').classList.toggle('set',A!==null);$('setB').classList.toggle('set',B!==null);if(A===null||B===null){looping=false;updateLoopBtn();}drawBand();}
  function updateLoopBtn(){$('loop').classList.toggle('on',looping);$('loopState').textContent=looping?'켜짐':'꺼짐';}
  function drawBand(){var band=$('band'),mA=$('markA'),mB=$('markB');
    if(duration>0&&A!==null){mA.style.display='block';mA.style.left=(A/duration*100)+'%';}else mA.style.display='none';
    if(duration>0&&B!==null){mB.style.display='block';mB.style.left=(B/duration*100)+'%';}else mB.style.display='none';
    if(duration>0&&A!==null&&B!==null){band.classList.add('on');band.style.left=(A/duration*100)+'%';band.style.width=((B-A)/duration*100)+'%';}else band.classList.remove('on');}

  document.querySelectorAll('.speed button').forEach(function(b){b.addEventListener('click',function(){speed=parseFloat(b.dataset.s);if(ready)player.setPlaybackRate(speed);document.querySelectorAll('.speed button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');$('speedTag').textContent=speed.toFixed(2).replace(/0$/,'')+'×';});});

  var tl=$('timeline');
  tl.addEventListener('click',function(e){if(e.target&&e.target.closest&&e.target.closest('.marker'))return;if(!ready||!duration)return;var rect=tl.getBoundingClientRect();var x=((e.touches?e.touches[0].clientX:e.clientX)-rect.left)/rect.width;x=Math.min(1,Math.max(0,x));player.seekTo(x*duration,true);});
  function bindMarker(markEl,which){
    markEl.addEventListener('pointerdown',function(e){
      e.preventDefault();e.stopPropagation();if(!duration)return;
      var rect=tl.getBoundingClientRect();markEl.classList.add('grabbing');
      function move(ev){
        var x=(ev.clientX-rect.left)/rect.width;x=Math.min(1,Math.max(0,x));var t=x*duration;
        if(which==='A'){A=t;if(B!==null&&A>B)A=B;}else{B=t;if(A!==null&&B<A)B=A;}
        $('aTime').textContent=A!==null?fmt(A):'—';$('bTime').textContent=B!==null?fmt(B):'—';
        $('setA').classList.toggle('set',A!==null);$('setB').classList.toggle('set',B!==null);drawBand();
      }
      function up(ev){
        document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
        markEl.classList.remove('grabbing');
        if(ready){if(which==='A'&&A!==null)player.seekTo(A,true);else if(which==='B'&&B!==null)player.seekTo(B,true);}
      }
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
    });
  }
  bindMarker($('markA'),'A');bindMarker($('markB'),'B');

  // ---- panel: segments / playlist queue ----
  var segments={};        // vid -> [{start,end,memo}]
  var segCtx=null;
  var panelMode=null;     // 'seg' | 'list' | null
  var playQueue=[],playIndex=-1;

  function songLabel(s){return (s&&s.artist?s.artist+' - ':'')+((s&&s.song)||'');}
  function curSegs(){if(!curId)return null;if(!segments[curId])segments[curId]=[];return segments[curId];}
  function segLabel(i){return i<26?String.fromCharCode(65+i):('#'+(i+1));}

  function renderPanel(){if(panelMode==='seg')renderSegs();else if(panelMode==='list')renderQueue();}

  function renderSegs(){
    var el=$('panelList');var segs=curId?segments[curId]:null;
    if(!segs||!segs.length){el.innerHTML='<div class="empty-note">저장된 구간이 없습니다.<br>A·B 지점을 정하고 구간 저장을 누르세요</div>';return;}
    el.innerHTML='';
    segs.forEach(function(sg,i){
      var row=document.createElement('div');row.className='seg';
      row.innerHTML='<div class="sopen"><div class="ln"><b>'+segLabel(i)+'</b><span class="rng">'+fmt(sg.start)+' ~ '+fmt(sg.end)+'</span>'+(sg.memo?'<span class="memo">'+escapeHtml(sg.memo)+'</span>':'')+'</div></div>'+
        '<button class="sact ren" title="메모 수정">'+penSvg+'</button><button class="sact del" title="삭제">×</button>';
      row.querySelector('.sopen').addEventListener('click',function(){playSeg(sg);});
      row.querySelector('.ren').addEventListener('click',function(){openSegModal(i);});
      row.querySelector('.del').addEventListener('click',function(){segs.splice(i,1);save();renderSegs();});
      el.appendChild(row);
    });
  }
  function playSeg(sg){A=sg.start;B=sg.end;updateAB();if(ready){player.seekTo(A,true);player.playVideo();}looping=true;updateLoopBtn();zoom=sg.zoom||1;panX=sg.panX||0;panY=sg.panY||0;mirrorOn=!!sg.mirror;$('mirror').classList.toggle('on',mirrorOn);applyZoomUI();if(zoom>1||mirrorOn)showVideo();applyTransform();}

  function renderQueue(){
    var el=$('panelList');
    if(!playQueue.length){el.innerHTML='<div class="empty-note">재생 중인 목록이 없습니다.<br>플레이리스트 탭에서 곡을 선택해 보세요</div>';return;}
    el.innerHTML='';
    playQueue.forEach(function(s,i){
      var row=document.createElement('div');row.className='song';if(i===playIndex)row.classList.add('playing-now');
      row.innerHTML='<img src="https://i.ytimg.com/vi/'+s.vid+'/mqdefault.jpg" alt="">'+
        '<div class="smeta" style="cursor:pointer"><b>'+escapeHtml(s.song||'제목 없음')+'</b><small>'+escapeHtml(s.artist||'가수 미입력')+'</small></div>';
      row.addEventListener('click',function(){playIndex=i;playVid(s.vid,songLabel(s));renderQueue();});
      el.appendChild(row);
    });
  }

  // 곡 재생을 큐와 함께 시작 (플레이리스트 탭에서 호출)
  function playSong(s,fromId){
    playQueue = fromId===null ? root.filter(function(it){return it.kind==='song';}) : ((folderById(fromId)||{children:[]}).children).slice();
    playIndex = playQueue.indexOf(s);
    if(playIndex<0){ // slice로 객체 동일하지만 안전망
      for(var k=0;k<playQueue.length;k++){if(playQueue[k].vid===s.vid){playIndex=k;break;}}
    }
    playVid(s.vid,songLabel(s));
  }
  function nextSong(){
    if(playIndex>=0&&playIndex+1<playQueue.length){
      playIndex++;var s=playQueue[playIndex];
      playVid(s.vid,songLabel(s));
      if(panelMode==='list')renderQueue();
    }
  }

  $('saveSeg').addEventListener('click',function(){
    var fromList=(panelMode==='list');
    if(!fromList&&curId&&A!==null&&B!==null){
      var segs=curSegs();
      var dup=segs.some(function(s){return Math.round(s.start)===Math.round(A)&&Math.round(s.end)===Math.round(B);});
      if(dup){flash('이미 저장된 구간입니다');}
      else{segs.push({start:A,end:B,memo:'',zoom:zoom,panX:panX,panY:panY,mirror:mirrorOn});save();}
    }
    panelMode='seg';$('panelList').style.display='flex';
    $('saveSeg').classList.add('on');$('showList').classList.remove('on');
    renderSegs();
  });
  $('showList').addEventListener('click',function(){
    if(panelMode==='list'){panelMode=null;$('panelList').style.display='none';$('showList').classList.remove('on');return;}
    panelMode='list';$('panelList').style.display='flex';
    $('showList').classList.add('on');$('saveSeg').classList.remove('on');
    renderQueue();
  });

  function openSegModal(i){segCtx={index:i};var s=curSegs()[i];$('mMemo').value=s?s.memo:'';$('segModal').classList.add('on');setTimeout(function(){$('mMemo').focus();},30);}
  function closeSeg(){$('segModal').classList.remove('on');}
  $('segCancel').addEventListener('click',closeSeg);
  $('segModal').addEventListener('click',function(e){if(e.target===$('segModal'))closeSeg();});
  $('segSave').addEventListener('click',function(){var segs=curSegs();if(segs&&segs[segCtx.index])segs[segCtx.index].memo=$('mMemo').value.trim();save();closeSeg();renderSegs();});
  $('mMemo').addEventListener('keydown',function(e){if(e.key==='Enter')$('segSave').click();});

  // ---- view switch ----
  function showRoot(){currentFolder=null;$('rootView').style.display='block';$('folderView').style.display='none';renderRoot();}
  function openFolder(id){currentFolder=id;$('rootView').style.display='none';$('folderView').style.display='block';renderFolder();}
  $('backFolder').addEventListener('click',showRoot);
  function rerender(){save();if(currentFolder===null)renderRoot();else renderFolder();}

  // ---- render root (folders + songs mixed) ----
  function renderRoot(){
    var el=$('rootlist');
    if(!root.length){el.innerHTML='<div class="empty-note">유튜브 주소로 곡을 저장하거나<br>+ 새 폴더를 만들어 보세요</div>';return;}
    el.innerHTML='';
    root.forEach(function(it,i){
      if(it.kind==='folder')el.appendChild(folderCard(it,i));
      else el.appendChild(songRow(it,root,i,el,null));
    });
  }
  function renderFolder(){
    var f=folderById(currentFolder);if(!f){showRoot();return;}
    $('folderName').textContent=f.name;
    var el=$('songlist');
    if(!f.children.length){el.innerHTML='<div class="empty-note">이 폴더에 곡이 없습니다.<br>최상위에서 곡을 드래그해 넣거나<br>이동 버튼으로 옮겨보세요</div>';return;}
    el.innerHTML='';
    f.children.forEach(function(s,i){el.appendChild(songRow(s,f.children,i,el,f.id));});
  }

  function folderCard(f,index){
    var row=document.createElement('div');row.className='folder';row.dataset.fid=f.id;
    row.innerHTML='<span class="drag" title="끌어서 순서 변경">≡</span>'+
      '<div class="fopen"><div class="ficon">'+folderSvg+'</div><div class="fmeta"><b>'+escapeHtml(f.name)+'</b><small>'+f.children.length+'곡</small></div></div>'+
      '<button class="fact ren" title="이름변경">'+penSvg+'</button><button class="fact del" title="삭제">×</button><span class="chev">›</span>';
    row.querySelector('.fopen').addEventListener('click',function(){openFolder(f.id);});
    row.querySelector('.ren').addEventListener('click',function(e){e.stopPropagation();openFolderModal('edit',f.id,f.name);});
    row.querySelector('.del').addEventListener('click',function(e){e.stopPropagation();if(confirm('"'+f.name+'" 폴더와 안의 곡을 모두 삭제할까요?')){root=root.filter(function(it){return !(it.kind==='folder'&&it.id===f.id);});rerender();}});
    bindDrag(row.querySelector('.drag'),row,root,index,{allowDropFolder:false,listEl:$('rootlist'),onChange:rerender});
    return row;
  }
  function songRow(s,arr,index,listEl,fromId){
    var row=document.createElement('div');row.className='song';
    row.innerHTML='<span class="drag" title="끌어서 순서 변경 / 폴더에 넣기">≡</span>'+
      '<img src="https://i.ytimg.com/vi/'+s.vid+'/mqdefault.jpg" alt="">'+
      '<div class="smeta"><b>'+escapeHtml(s.song||'제목 없음')+'</b><small>'+escapeHtml(s.artist||'가수 미입력')+'</small></div>'+
      '<button class="sact mov" title="다른 위치로 이동">'+moveSvg+'</button>'+
      '<button class="sact ren" title="수정">'+penSvg+'</button>'+
      '<button class="sact del" title="삭제">×</button>';
    row.querySelector('.smeta').addEventListener('click',function(){playSong(s,fromId);});
    row.querySelector('.mov').addEventListener('click',function(){openMoveModal(fromId,index);});
    row.querySelector('.ren').addEventListener('click',function(){openSongModal('edit',fromId,index,s.vid,s.artist,s.song);});
    row.querySelector('.del').addEventListener('click',function(){arr.splice(index,1);rerender();});
    bindDrag(row.querySelector('.drag'),row,arr,index,{allowDropFolder:(fromId===null),listEl:listEl,onChange:rerender});
    return row;
  }

  // ---- drag: reorder + drop into folder ----
  function bindDrag(handle,row,arr,index,opts){
    handle.addEventListener('pointerdown',function(e){
      e.preventDefault();e.stopPropagation();
      var listEl=opts.listEl;
      var rows=Array.prototype.slice.call(listEl.children);
      var startY=e.clientY;var moved=false;var dropFolder=null;
      var canFolder=opts.allowDropFolder&&arr[index]&&arr[index].kind==='song';
      row.classList.add('dragging');
      function move(ev){
        moved=true;row.style.transform='translateY('+(ev.clientY-startY)+'px)';
        if(canFolder){
          row.style.pointerEvents='none';
          var under=document.elementFromPoint(ev.clientX,ev.clientY);
          row.style.pointerEvents='';
          var fc=under&&under.closest?under.closest('.folder'):null;
          listEl.querySelectorAll('.folder.drop-target').forEach(function(x){x.classList.remove('drop-target');});
          if(fc){fc.classList.add('drop-target');dropFolder=fc;}else dropFolder=null;
        }
      }
      function up(ev){
        document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
        row.style.transform='';row.classList.remove('dragging');
        listEl.querySelectorAll('.folder.drop-target').forEach(function(x){x.classList.remove('drop-target');});
        if(!moved)return;
        if(dropFolder){
          var tf=folderById(dropFolder.dataset.fid);
          if(tf){var item=arr.splice(index,1)[0];tf.children.push(item);}
        }else{
          var y=ev.clientY;var slot=rows.length;
          for(var k=0;k<rows.length;k++){if(k===index)continue;var b=rows[k].getBoundingClientRect();if(y<b.top+b.height/2){slot=k;break;}}
          var item=arr.splice(index,1)[0];
          var adj=slot>index?slot-1:slot;adj=Math.max(0,Math.min(arr.length,adj));
          arr.splice(adj,0,item);
        }
        opts.onChange();
      }
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
    });
  }

  // ---- save / edit song ----
  function fillLoc(){
    var sel=$('mLoc');sel.innerHTML='';
    var o=document.createElement('option');o.value='root';o.textContent='최상위 (폴더 없음)';sel.appendChild(o);
    root.forEach(function(it){if(it.kind==='folder'){var x=document.createElement('option');x.value=it.id;x.textContent=it.name;sel.appendChild(x);}});
  }
  $('saveSong').addEventListener('click',function(){
    var vid=extractId($('url').value);
    if(!vid){alert('유튜브 주소를 확인해 주세요');return;}
    songCtx={mode:'new',vid:vid};
    $('songModalTitle').textContent='곡 저장';$('locWrap').style.display='block';fillLoc();$('mLoc').value='root';
    $('mArtist').value='';$('mSong').value='제목 불러오는 중…';
    $('songModal').classList.add('on');
    fetchMeta(vid,function(title){var p=parseTitle(title);$('mArtist').value=p.artist;$('mSong').value=p.song||title||'';setTimeout(function(){$('mSong').focus();$('mSong').select();},30);});
  });
  function openSongModal(mode,fromId,index,vid,artist,song){
    songCtx={mode:mode,fromId:fromId,index:index,vid:vid};
    $('songModalTitle').textContent=mode==='edit'?'곡 정보 수정':'곡 저장';
    $('locWrap').style.display=mode==='edit'?'none':'block';
    $('mArtist').value=artist||'';$('mSong').value=song||'';
    $('songModal').classList.add('on');setTimeout(function(){$('mSong').focus();},30);
  }
  function closeSong(){$('songModal').classList.remove('on');}
  $('songCancel').addEventListener('click',closeSong);
  $('songModal').addEventListener('click',function(e){if(e.target===$('songModal'))closeSong();});
  $('songSave').addEventListener('click',function(){
    var artist=$('mArtist').value.trim(),song=$('mSong').value.trim();
    if(!song){alert('곡명을 입력해 주세요');return;}
    if(songCtx.mode==='new'){
      var loc=$('mLoc').value;
      var item={kind:'song',vid:songCtx.vid,artist:artist,song:song};
      if(loc==='root')root.push(item);else{var f=folderById(loc);if(f)f.children.push(item);else root.push(item);}
      $('url').value='';
    }else{
      var arr=songCtx.fromId===null?root:(folderById(songCtx.fromId)||{children:[]}).children;
      if(arr[songCtx.index]){arr[songCtx.index].artist=artist;arr[songCtx.index].song=song;}
    }
    closeSong();rerender();
  });
  $('mSong').addEventListener('keydown',function(e){if(e.key==='Enter')$('songSave').click();});

  // ---- move song ----
  function openMoveModal(fromId,index){
    moveCtx={fromId:fromId,index:index};
    var pick=$('folderPick');pick.innerHTML='';var opts=[];
    if(fromId!==null)opts.push({id:'root',name:'최상위 (폴더 없음)',count:root.filter(function(it){return it.kind==='song';}).length});
    root.forEach(function(it){if(it.kind==='folder'&&it.id!==fromId)opts.push({id:it.id,name:it.name,count:it.children.length});});
    if(!opts.length){pick.innerHTML='<div class="empty-note">이동할 다른 위치가 없습니다.<br>+ 새 폴더를 만들어 주세요</div>';}
    else opts.forEach(function(o){
      var b=document.createElement('button');
      b.innerHTML='<span class="fp-icon">'+folderSvg+'</span><span class="nm">'+escapeHtml(o.name)+'</span><small>'+o.count+'곡</small>';
      b.addEventListener('click',function(){
        var src=moveCtx.fromId===null?root:(folderById(moveCtx.fromId)||{children:[]}).children;
        var item=src.splice(moveCtx.index,1)[0];if(!item){closeMove();return;}
        if(o.id==='root')root.push(item);else{var f=folderById(o.id);if(f)f.children.push(item);}
        closeMove();rerender();
      });
      pick.appendChild(b);
    });
    $('moveModal').classList.add('on');
  }
  function closeMove(){$('moveModal').classList.remove('on');}
  $('moveCancel').addEventListener('click',closeMove);
  $('moveModal').addEventListener('click',function(e){if(e.target===$('moveModal'))closeMove();});

  // ---- folder add / rename ----
  $('addFolder').addEventListener('click',function(){openFolderModal('new');});
  $('renameFolder').addEventListener('click',function(){var f=folderById(currentFolder);if(f)openFolderModal('edit',f.id,f.name);});
  function openFolderModal(mode,folderId,name){
    folderCtx={mode:mode,folderId:folderId};
    $('folderModalTitle').textContent=mode==='edit'?'폴더 이름 변경':'새 폴더';
    $('mFolder').value=name||'';$('folderModal').classList.add('on');setTimeout(function(){$('mFolder').focus();$('mFolder').select();},30);
  }
  function closeFolder(){$('folderModal').classList.remove('on');}
  $('folderCancel').addEventListener('click',closeFolder);
  $('folderModal').addEventListener('click',function(e){if(e.target===$('folderModal'))closeFolder();});
  $('folderSave').addEventListener('click',function(){
    var name=$('mFolder').value.trim();if(!name){alert('폴더 이름을 입력해 주세요');return;}
    if(folderCtx.mode==='new'){root.push({kind:'folder',id:uid(),name:name,children:[]});}
    else{var f=folderById(folderCtx.folderId);if(f){f.name=name;if(currentFolder===f.id)$('folderName').textContent=name;}}
    closeFolder();rerender();
  });
  $('mFolder').addEventListener('keydown',function(e){if(e.key==='Enter')$('folderSave').click();});

  // ---- wake ----
  var wakeLock=null;
  $('wake').addEventListener('click',async function(){
    var on=$('wake').classList.contains('on');
    if(on){if(wakeLock){try{await wakeLock.release();}catch(e){}wakeLock=null;}$('wake').classList.remove('on');}
    else{try{wakeLock=await navigator.wakeLock.request('screen');$('wake').classList.add('on');wakeLock.addEventListener('release',function(){$('wake').classList.remove('on');});}catch(e){alert('이 브라우저에선 화면 켜둠을 지원하지 않습니다');}}
  });

  // ---- tick ----
  setInterval(function(){
    if(!ready||!player||typeof player.getCurrentTime!=='function')return;
    var t=player.getCurrentTime()||0;
    if(!duration){duration=player.getDuration()||0;if(duration)$('dur').textContent=fmt(duration);}
    if(duration){var pct=t/duration*100;$('head').style.left=pct+'%';$('played').style.width=pct+'%';$('cur').textContent=fmt(t);}
    if(looping&&A!==null&&B!==null){if(t>=B||t<A-0.3){player.seekTo(A,true);}}
  },250);

  (function(){
    var st=document.getElementById('stage');
    var btns=document.querySelector('.stage-btns');
    function sync(){
      btns.classList.toggle('is-empty',st.classList.contains('empty'));
      btns.classList.toggle('is-video',st.classList.contains('video-visible'));
    }
    new MutationObserver(sync).observe(st,{attributes:true,attributeFilter:['class']});
    sync();
  })();

  load();showRoot();updateFootnote();
})();
</script>
</body>
</html>
